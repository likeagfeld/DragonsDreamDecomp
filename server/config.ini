# Dragon's Dream DreamPi Server Configuration
# Place this file alongside netlink.py on the DreamPi
#
# Each [server.XXX] section maps a dial code to a TCP server.
# The dial code (XXX) is what the Saturn dials to reach this server.
#
# Options:
#   host     = IP address or hostname of the game server
#   port     = TCP port number
#   name     = Display name for logging
#   handler  = "transparent" (no serial flush, for BBS-protocol games like DD)
#              "server" (default, flushes serial buffer, optional auth)
#   shared_secret = (optional, for handler=server only) auth password

[server.698]
host = 192.168.50.180
port = 8020
name = Dragon's Dream
handler = transparent
